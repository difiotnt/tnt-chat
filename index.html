<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TNT Chat - Premium Experience</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Custom Premium CSS -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- CryptoJS untuk enkripsi/dekripsi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Emoji Picker (module) -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    
    <style>
        /* Join Screen Styles */
        #join-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
        }

        emoji-picker {
            position: absolute;
            bottom: 90px;
            right: 16px;
            left: 16px;
            z-index: 1000;
            width: auto;
            max-height: 350px;
        }
        @media (min-width: 768px) {
            emoji-picker {
                right: 40px;
                left: auto;
                width: 350px;
            }
        }
    </style>
</head>
<body>
    <!-- Chat Screen -->
    <div id="chat-screen" style="display:none;">
        <header class="header">
            <div class="header-info">
                <h2 id="member-name">Memuat...</h2>
                <span id="member-id-display" style="font-size:0.7rem; color:var(--text-muted); display:block;"></span>
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="window.clearLocalChat()" class="secondary" style="padding: 8px 12px; font-size: 0.8rem; border-radius: 12px;">🧹 Bersihkan</button>
                <button onclick="window.logoutMember()" class="danger" style="padding: 8px 12px; font-size: 0.8rem; border-radius: 12px;">🚪 Keluar</button>
            </div>
        </header>

        <main id="chat-panel">
            <div id="chat-box"></div>
            <div class="input-area">
                <button id="emoji-btn">😊</button>
                <button id="attach-btn" onclick="document.getElementById('image-input').click()">🖼️</button>
                <input type="text" id="message-input" placeholder="Ketik pesan..." autocomplete="off">
                <button id="voice-btn">🎤</button>
                <button onclick="window.sendMessage()" id="send-btn">🚀</button>
                <input type="file" id="image-input" style="display:none;" accept="image/*">
            </div>
            <emoji-picker id="picker" style="display: none;"></emoji-picker>
        </main>
    </div>

    <!-- Join Screen (For APK/Direct Access) -->
    <div id="join-screen" style="display:none;">
        <div class="login-card">
            <h2>🚀 TNT Chat</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem;">Masukkan Username dari Admin untuk masuk</p>
            <input type="text" id="join-name-input" placeholder="Username..." autocomplete="off" style="width: 100%; padding: 14px; background: var(--surface-dark); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; margin-bottom: 5px; outline: none;">
            <p id="login-feedback" style="color: var(--neon-accent); font-size: 0.75rem; margin-bottom: 15px; height: 1em;"></p>
            <button onclick="window.loginChat()" style="width:100%; padding: 14px; background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary)); border:none; border-radius: 12px; color:#fff; font-weight:800; cursor:pointer;">MASUK CHAT</button>
        </div>
    </div>

    <div id="error-screen" style="display:none;">
        <div class="container" style="text-align: center; justify-content: center; display: flex; flex-direction: column; height: 100vh;">
            <h2 style="color: var(--neon-accent); font-size: 2rem; margin-bottom: 20px;">❌ Error</h2>
            <p id="error-message" style="color: var(--text-secondary); margin-bottom: 30px;"></p>
            <button onclick="location.reload()" class="secondary" style="align-self: center;">Coba Lagi</button>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="image-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
        <button onclick="document.getElementById('image-modal').style.display='none'" style="position:absolute; top:20px; right:20px; background:var(--neon-accent); color:#fff; border:none; padding:10px 20px; border-radius:10px; font-weight:800; cursor:pointer;">TUTUP (X)</button>
        <img id="modal-img" src="" style="max-width:95%; max-height:80%; border-radius:12px; box-shadow:0 0 30px rgba(0,0,0,0.5);">
    </div>

    <audio id="notif-sound" src="/assets/notif.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, get, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSLVGFpo-1dZ3_fMX_neOKEXHVYrT22nw",
            authDomain: "tntchat-c8d15.firebaseapp.com",
            databaseURL: "https://tntchat-c8d15-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tntchat-c8d15",
            storageBucket: "tntchat-c8d15.firebasestorage.app",
            messagingSenderId: "62397511792",
            appId: "1:62397511792:web:9ae54b5ec503caa35b1cb5",
            measurementId: "G-G1SKL6L3R3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const SECRET_KEY = "!qawsedrftg%^78";

        // Logic for APK/Member ID
        let memberId = null;
        const path = window.location.pathname;
        const urlParams = new URLSearchParams(window.location.search);
        
        const pathSegments = path.split('/');
        const cIndex = pathSegments.indexOf('c');
        if (cIndex !== -1) {
            memberId = pathSegments[cIndex + 1];
        } else if (urlParams.get('c')) {
            memberId = urlParams.get('c');
        }

        const savedId = localStorage.getItem('tnt_member_id');

        const chatScreen = document.getElementById('chat-screen');
        const joinScreen = document.getElementById('join-screen');
        const errorScreen = document.getElementById('error-screen');
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('message-input');
        const imageInput = document.getElementById('image-input');
        const memberNameEl = document.getElementById('member-name');
        const memberIdDisplay = document.getElementById('member-id-display');
        const notifSound = document.getElementById('notif-sound');
        const picker = document.querySelector('#picker');
        const emojiBtn = document.querySelector('#emoji-btn');

        if (memberId) {
            initializeMember(memberId);
        } else if (savedId) {
            memberId = savedId;
            initializeMember(memberId);
        } else {
            joinScreen.style.display = 'flex';
        }

        window.loginChat = async () => {
            const nameInput = document.getElementById('join-name-input');
            const feedback = document.getElementById('login-feedback');
            const name = nameInput.value.trim();
            if (!name) return;

            const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            feedback.textContent = "⌛ Mengecek...";
            
            try {
                const snapshot = await get(ref(db, `tntchat/members/${id}`));
                if (snapshot.exists()) {
                    localStorage.setItem('tnt_member_id', id);
                    location.reload();
                } else {
                    feedback.textContent = "❌ Username tidak terdaftar di Admin";
                    nameInput.style.borderColor = "var(--neon-accent)";
                }
            } catch (e) {
                feedback.textContent = "⚠️ Gangguan koneksi";
            }
        };

        function showError(reason = '') {
            chatScreen.style.display = 'none';
            joinScreen.style.display = 'none';
            errorScreen.style.display = 'block';
            document.getElementById('error-message').textContent = reason;
        }

        async function initializeMember(id) {
            chatScreen.style.display = 'flex';
            joinScreen.style.display = 'none';
            
            try {
                const memberRef = ref(db, `tntchat/members/${id}`);
                const snapshot = await get(memberRef);
                
                if (!snapshot.exists()) {
                    localStorage.removeItem('tnt_member_id');
                    showError(`ID "${id}" tidak valid.`);
                    return;
                }
                
                const memberData = snapshot.val();
                memberNameEl.textContent = `${memberData.name} 👋`;
                memberIdDisplay.textContent = `@${id}`;
                update(memberRef, { lastActive: Date.now() });
                
                const chatId = `admin_${id}`;
                onChildAdded(ref(db, `tntchat/chats/${chatId}/messages`), (snapshot) => {
                    const msg = snapshot.val();
                    displayMessage(msg);
                });
            } catch (error) {
                showError('Database error: ' + error.message);
            }
        }

        function displayMessage(msg) {
            let displayText = msg.text;
            if (msg.encrypted && msg.type !== 'image') {
                try {
                    const bytes = CryptoJS.AES.decrypt(msg.text, SECRET_KEY);
                    displayText = bytes.toString(CryptoJS.enc.Utf8);
                } catch (e) { displayText = '[Terenkripsi]'; }
            }
            
            const div = document.createElement('div');
            div.className = `msg ${msg.sender === 'admin' ? 'admin' : 'anggota'}`;
            
            if (msg.type === 'image') {
                const img = document.createElement('img');
                img.src = displayText; // Base64 or URL
                img.style.maxWidth = '100%';
                img.style.borderRadius = '12px';
                img.style.display = 'block';
                img.style.cursor = 'pointer';
                img.onclick = () => {
                    const modal = document.getElementById('image-modal');
                    const modalImg = document.getElementById('modal-img');
                    modalImg.src = displayText;
                    modal.style.display = 'flex';
                };
                div.appendChild(img);
            } else {
                div.textContent = displayText;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            if (msg.sender === 'admin') {
                notifSound.currentTime = 0;
                notifSound.play().catch(()=>{});
            }
        }

        window.sendMessage = () => {
            const text = msgInput.value.trim();
            if (!text) return;
            const encrypted = CryptoJS.AES.encrypt(text, SECRET_KEY).toString();
            push(ref(db, `tntchat/chats/admin_${memberId}/messages`), {
                sender: memberId, text: encrypted, encrypted: true, timestamp: Date.now()
            });
            msgInput.value = '';
            msgInput.focus();
        };

        // IMAGE HANDLER (BASE64 VERSION - NO STORAGE NEEDED)
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Kompres gambar pakai Canvas agar hemat database
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Convert ke Base64 dengan kualitas 0.7
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    push(ref(db, `tntchat/chats/admin_${memberId}/messages`), {
                        sender: memberId,
                        text: base64,
                        type: 'image',
                        timestamp: Date.now()
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // UI Handlers
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', (e) => {
            if (!picker.contains(e.target) && e.target !== emojiBtn) picker.style.display = 'none';
        });
        picker.addEventListener('emoji-click', event => {
            msgInput.value += event.detail.unicode;
            picker.style.display = 'none';
            msgInput.focus();
        });
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.sendMessage(); });
        window.clearLocalChat = () => { if (confirm('Bersihkan layar?')) chatBox.innerHTML = ''; };

        window.logoutMember = () => {
            if (confirm('Apakah Anda yakin ingin keluar? Anda perlu memasukkan nama lagi untuk masuk kembali.')) {
                localStorage.removeItem('tnt_member_id');
                location.reload();
            }
        };
        document.body.addEventListener('click', function initSound() {
            notifSound.play().then(() => { notifSound.pause(); notifSound.currentTime = 0; }).catch(()=>{});
            document.body.removeEventListener('click', initSound);
        }, { once: true });
    </script>
</body>
</html>
